# i3blocks config file
#
# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks
#
# List of valid properties:
#
# align
# color
# background
# border
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent

# Global properties
#
# The top properties below are applied to every block, but can be overridden.
# Each block command defaults to the script name to avoid boilerplate.
command=$HOME/repos/i3blocks-gaps/scripts/$BLOCK_NAME
separator_block_width=15
markup=none

# Volume indicator
#
# The first parameter sets the step (and units to display)
# The second parameter overrides the mixer selection
# See the script for details.
[audio]
label=
interval=5

[brightness]
label=
interval=5

# Memory usage
#
# The type defaults to "mem" if the instance is not specified.
[memory]
label=
separator=false
interval=30

# Disk usage
#
# The directory defaults to $HOME if the instance is not specified.
# The script may be called with a optional argument to set the alert
# (defaults to 10 for 10%).
[disk]
label=
#instance=/mnt/data
interval=30

[vpn]
label=
interval=5

[weather]
instance=2744118
interval=60
# Network interface monitoring
#
# If the instance is not specified, use the interface used for default route.
# The address can be forced to IPv4 or IPv6 with -4 or -6 switches.
[iface]
#instance=wlan0
label=
color=#C9CCDB
interval=10
separator=false

[wifi]
instance=wlp7s0
interval=10
separator=true
label=

# CPU usage
#
# The script may be called with -w and -c switches to specify thresholds,
# see the script for details.
[cpu_usage]
label=CPU
interval=10
min_width=CPU: 100.00%
#separator=false

#[load_average]
#interval=10

# Battery indicator
#
[batterybar]
command=$HOME/repos/i3blocks-gaps/scripts/batterybar #run batterybar -h for options
label=bat:
interval=5
markup=pango
min_width=bat: ■■■■■
separator=true

[key_layout]
command=$HOME/repos/i3blocks-gaps/scripts/key_layout
label=Layout
interval=30
# Date Time

[date]
command=echo "`date +'%d %b'`"
interval=1
label=
color=#C9CCDB
separator=true

[time]
command=echo "`date +'%H:%M'`"
interval=1
label=
color=#C9CCDB
